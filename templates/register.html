{% extends "base.html" %}
{% block title %}Sign up – AudioLovers{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Create account</h1>
</div>

<form action="/create" method="post" style="max-width:380px;">
    <div class="form-group">
        <label for="username">User</label>
        <input type="text" id="username" name="username" required autofocus>
    </div>
    <div class="form-group">
        <label for="password1">Password</label>
        <input type="password" id="password1" name="password1" required>
    </div>
    <div class="form-group">
        <label for="password2">Password again</label>
        <input type="password" id="password2" name="password2" required>
    </div>
    <button type="submit" class="btn btn-submit">Create account</button>
    <p style="margin-top:14px; color:#888; font-size:0.9rem;">
        Already have an account? <a href="/login" style="color:#1db954;">Log in</a>
    </p>
</form>
{% endblock %}
