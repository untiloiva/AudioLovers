<!DOCTYPE html>
<html>
<head>
    <title>AudioLovers</title>
    {% block head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
    
    <!-- Fixed audio player -->
    <div id="audio-player-container" style="position:fixed;bottom:0;left:0;right:0;height:80px;background:rgba(25,20,20,0.98);display:flex;align-items:center;padding:0 20px;font-family:system-ui;color:#fff;z-index:999;box-shadow:0 -4px 30px rgba(0,0,0,.5);box-sizing:border-box;">
        <div id="song-title" style="flex:1;font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:15px;">Select song</div>
        <div id="waveform" style="flex:1;height:4px;background:rgba(255,255,255,.2);border-radius:2px;margin:0 15px;position:relative;overflow:hidden;"></div>
        <div id="controls" style="display:flex;gap:12px;align-items:center;">
            <button class="btn" id="rewind" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:8px;border-radius:50%;transition:all .2s;">⏪</button>
            <button class="btn" id="play-pause" style="background:none;border:none;color:#fff;font-size:22px;font-weight:700;cursor:pointer;padding:8px;border-radius:50%;transition:all .2s;">⏵</button>
            <button class="btn" id="forward" style="background:none;border:none;color:#fff;font-size:18px;cursor:pointer;padding:8px;border-radius:50%;transition:all .2s;">⏩</button>
            <input type="range" id="volume" min="0" max="1" step=".01" value=".6" style="width:80px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;outline:none;cursor:pointer;">
        </div>
        <audio id="player" preload="metadata" style="position:absolute;bottom:0;left:0;width:1px;height:1px;opacity:0;"></audio>
    </div>
    
    <script src="/static/player.js" defer></script>
    
    <script>
        // Inline player logic (adapted from soundcloud-player.html)
        (function() {
            const p = document.getElementById('player');
            const pp = document.getElementById('play-pause');
            const v = document.getElementById('volume');
            const st = document.getElementById('song-title');
            const w = document.getElementById('waveform');
            let ui = 0;
            let cs = null;

            // Volume
            v.oninput = () => { p.volume = v.value; };

            // Progress
            p.ontimeupdate = () => {
                if (p.duration) {
                    w.style.setProperty('--progress', (p.currentTime / p.duration * 100) + '%');
                    if (cs) {
                        cs.currentTime = p.currentTime;
                        sessionStorage.audioState = JSON.stringify(cs);
                    }
                }
            };

            // Play/Pause toggle
            pp.onclick = async () => {
                ui = 1;
                p.muted = false;
                if (p.paused || p.ended) {
                    await p.play();
                    pp.textContent = '⏸';
                } else {
                    p.pause();
                    pp.textContent = '⏵';
                }
            };

            // Load song (called from player.js)
            window.loadSong = async (src, title) => {
                if (p.src === src && !p.paused) return;
                p.src = src;
                p.currentTime = 0;
                st.textContent = title;
                cs = {src: src, title: title, currentTime: 0};
                await p.load();
                if (ui) {
                    p.muted = false;
                    await p.play();
                    pp.textContent = '⏸';
                }
            };

            // Restore state on load
            window.addEventListener('load', async () => {
                const s = sessionStorage.audioState;
                if (s) {
                    try {
                        cs = JSON.parse(s);
                        p.src = cs.src;
                        st.textContent = cs.title;
                        await p.load();
                        p.currentTime = cs.currentTime || 0;
                        if (ui) {
                            await p.play();
                            pp.textContent = '⏸';
                        }
                    } catch (e) {}
                }
            });

            // Aggressive resume
            setInterval(async () => {
                if (!document.hidden && !p.paused && p.src && ui) {
                    try { await p.play(); } catch (e) {}
                }
            }, 1000);

            document.onvisibilitychange = async () => {
                if (!document.hidden && !p.paused && ui && p.src) {
                    try { await p.play(); } catch (e) {}
                }
            };

            // Keyboard
            document.onkeydown = (e) => {
                ui = 1;
                p.muted = false;
                if (e.code === 'Space') {
                    e.preventDefault();
                    pp.click();
                } else if (e.code === 'ArrowRight') {
                    p.currentTime += 10;
                } else if (e.code === 'ArrowLeft') {
                    p.currentTime -= 10;
                }
            };

            // Controls
            document.getElementById('rewind').onclick = () => { p.currentTime = Math.max(0, p.currentTime - 10); };
            document.getElementById('forward').onclick = () => { p.currentTime = Math.min(p.duration || 0, p.currentTime + 10); };
        })();
    </script>
</body>
</html>
