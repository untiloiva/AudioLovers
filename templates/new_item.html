{% extends "base.html" %}
{% block title %}Add Audio – AudioLovers{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Add Audio</h1>
</div>

<form action="/create_item" method="post" enctype="multipart/form-data" style="max-width:500px;">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}">
    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required>
    </div>
    <div class="form-group">
        <label for="artist">Artist</label>
        <input type="text" id="artist" name="artist">
    </div>
    <div class="form-group">
        <label for="genre">Genre</label>
        <select id="genre" name="genre" required>
            <option value="" disabled selected>Select genre...</option>
            {% for genre in genres %}
            <option value="{{ genre }}">{{ genre }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="form-group">
        <label for="file">.mp3 file</label>
        <input type="file" id="file" name="file" accept=".mp3" required style="color:#eee;">
    </div>
    <div class="form-group">
        <label for="cover_image">Cover Image <span style="color:#666;">(optional, jpg/png/webp)</span></label>
        <input type="file" id="cover_image" name="cover_image" accept=".jpg,.jpeg,.png,.webp,.gif" style="color:#eee;">
    </div>
    <button type="submit" class="btn btn-submit">Add audio</button>
    <a href="/" style="margin-left:12px; color:#888; font-size:0.9rem;">Cancel</a>
</form>
{% endblock %}
